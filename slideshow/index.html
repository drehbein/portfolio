<!DOCTYPE html>
<html lang="en">

<head>
	<title>JavaScript Image Rollover Example</title>
	<meta charset="utf-8">

	<link href="css/styles.css" rel="stylesheet">
	
	<link href='http://fonts.googleapis.com/css?family=Rock+Salt' rel='stylesheet' type='text/css'>

</head>


<body>

	<div id="wrapper">

		<h2>Image Rollover</h2>

		<img src="images/picLighthouse.jpg" id="northShorePic">
		<p class="picCaption">Split Rock Lighthouse</p>

		<h2>Slideshow</h2>

    <div class="slider">
      <div class="slides">
        <img src="images/pics/pic1.jpg" alt="Juneau, Alaska" class="slide">
        <p class="picCaption">Juneau, Alaska from Doulas Island</p>
      </div>
      <button class="prev">&#10094</button>
      <button class="next">&#10095</button>
    </div>
	</div>

	<script src="js/rollOver.js"></script>
	<script src="js/slideshow.js"></script>

</body>
</html>
